# Header navigation (OMNIX). Top links + Shop mega-menu + mobile + meta.
# Hrefs point at real storefront routes; category links use real collection handles.
- id: main
  # The language/currency selector (was a static "EN / USD" link) is now a live
  # Shopify market switcher rendered by MarketSelector.astro.
  metaLinks:
    - { label: "Store Locator", href: "/contact" }
    - { label: "Track Order", href: "/account" }
    - { label: "Help", href: "/contact" }
  topLinks:
    - { label: "New Arrivals", href: "/products?sort=newest" }
    - { label: "Deals", href: "/collections/sale", badge: "-40%" }
    - { label: "Bundles", href: "/collections" }
    - { label: "Compare", href: "/compare" }
    - { label: "Contact Us", href: "/contact" }
  mega:
    columns:
      - heading: "Categories"
        links:
          - { label: "Phone &amp; Tablet", href: "/collections/phone-tablet" }
          - { label: "PC &amp; Laptop", href: "/collections/pc-laptop" }
          - { label: "Accessories", href: "/collections/accessories" }
          - { label: "Home Appliances", href: "/collections/home-appliances-1" }
          - { label: "Kitchen Appliances", href: "/collections/kitchen-appliances" }
      - heading: "Shop by Lifestyle"
        links:
          - { label: "For Gamers", href: "/collections/for-gamers" }
          - { label: "For Creators", href: "/collections/for-creators" }
          - { label: "For Athletes", href: "/collections/for-athletes" }
          - { label: "For Music Lovers", href: "/collections/for-music-lovers" }
          - { label: "For Remote Work", href: "/collections/for-remote-work" }
      - heading: "Bundles &amp; Deals"
        links:
          - { label: "Work-from-Home Bundle", href: "/collections/bundle-work-from-home" }
          - { label: "Active Life Bundle", href: "/collections/bundle-active-life" }
          - { label: "Creator Bundle", href: "/collections/bundle-creator" }
          - { label: "Sale", href: "/collections/sale" }
    feature:
      tag: "New Drop"
      title: "OmniBuds Pro 3 — Studio-grade ANC"
      body: "Adaptive noise cancellation, 30h playback, and lossless audio in a 5g form factor."
      image: "mp4xo966-headphones-extreme-minimalism.jpg"
  mobile:
    - { label: "Shop All", href: "/products" }
    - { label: "New Arrivals", href: "/products?sort=newest" }
    - { label: "Deals", href: "/collections/sale" }
    - { label: "Bundles", href: "/collections" }
    - { label: "Compare", href: "/compare" }
    - { label: "Contact Us", href: "/contact" }
