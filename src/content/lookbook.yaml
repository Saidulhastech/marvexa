# Lookbook ("Shop the Look") ‚Äî curated outfit looks for the homepage.
# Each list entry = ONE look. `image`/`label`/`top`/`left` are editorial; every
# item is a REAL Shopify product. Set `handle:` to pin a specific product to a
# hotspot; omit it and the slot auto-fills with a best-seller (no repeats) so the
# section works before any handles are curated. Product name/price/image and the
# size + colour variant pickers are all pulled LIVE from Shopify.
#
#   - id: look-01
#     label: "Look 01 ‚Äî SS 2026"
#     order: 0
#     image: "look-01.jpg"            # local asset OR a full https URL
#     items:
#       - { handle: oversized-linen-shirt, top: "30%", left: "38%" }
#       - { handle: tailored-trousers,     top: "62%", left: "32%" }
#       - { handle: leather-crossbody-bag, top: "72%", left: "78%", cardLeft: true }

