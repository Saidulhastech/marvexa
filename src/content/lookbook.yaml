  label: "Look 01 ‚Äî SS 2026"
  order: 0
  image: "https://images.unsplash.com/photo-1672753755304-140359dc739a?q=80&w=1200&auto=format&fit=crop"
  items:
    - { top: "30%", left: "38%" }
    - { top: "62%", left: "32%" }
