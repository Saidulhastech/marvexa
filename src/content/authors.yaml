#  Avatars use the pravatar service (allowed in astro.config
#  remotePatterns) so no local asset files are needed.
# ============================================================
sophie-laurent:
  name: Sophie Laurent
  role: Founder & Creative Director
  avatar: "https://i.pravatar.cc/200?img=45"
  bio: >-
    Sophie founded MARVEXA in Paris in 2019 after 15 years in luxury fashion.
    She writes about considered dressing, quality over quantity, and the art
    of building a wardrobe that actually works for your life.
  twitter: "@sophielaurent"

emeka-osei:
  name: Emeka Osei
  role: Head of Materials
  avatar: "https://i.pravatar.cc/200?img=12"
  bio: >-
    Former textile specialist at Loro Piana, Emeka sources every MARVEXA fabric
    personally from mills in Italy and Japan. He writes the craft-and-care
    stories — what quality really means, and how to make it last.
  twitter: "@emekaosei"

mia-thornton:
  name: Mia Thornton
  role: Brand Director
  avatar: "https://i.pravatar.cc/200?img=32"
  bio: >-
    Ten years in fashion across Paris and New York. Mia shapes how MARVEXA
    talks about style — practical guides for getting dressed with less effort
    and more intention.
  twitter: "@miathornton"
